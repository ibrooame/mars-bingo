<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Mars Bingo Live</title><link rel="stylesheet" href="/style.css"><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="/socket.io/socket.io.js"></script></head><body><main class="app"><section class="top"><div><p class="eyebrow">🔴 LIVE MARS CALL</p><h1 id="currentBall">--</h1><p id="history">Waiting for launch</p></div><div class="wallet"><span id="balance">0.00</span><small>ETB</small></div></section><section class="stats"><div>State <b id="state">waiting</b></div><div>Countdown <b id="countdown">--</b></div><div>Pool <b id="pool">0.00</b></div></section><section class="card"><div class="letters"><b>B</b><b>I</b><b>N</b><b>G</b><b>O</b></div><div id="cards" class="cards"></div></section><section class="actions"><button id="buyBtn">Buy Card</button><button id="claimBtn">Claim Bingo</button></section><section class="chat"><div id="messages"></div><form id="chatForm"><input id="chatInput" maxlength="180" placeholder="Chat with players"><button>Send</button></form></section><div id="toast" class="toast"></div></main><script src="/app.js"></script></body></html>
